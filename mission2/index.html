<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Flow Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cash Flow Tracker</h1>

    <!-- Salary -->
    <div class="card">
      <h2>Set Salary</h2>
      <input type="number" id="salaryInput" placeholder="Enter salary">
      <button id="setSalary">Set Salary</button>
    </div>

    <!-- Expense -->
    <div class="card">
      <h2>Add Expense</h2>
      <input type="text" id="expenseName" placeholder="Expense name">
      <input type="number" id="expenseAmount" placeholder="Amount">
      <button id="addExpense">Add Expense</button>
    </div>

    <!-- Expense List -->
    <div class="card">
      <h2>Expenses</h2>
      <ul id="expenseList"></ul>
    </div>

    <!-- Balance + Analytics side by side -->
    <div class="card-row">
      <div class="card">
        <h2>Balance</h2>
        <p id="balance">₹0</p>
        <p id="salaryDisplay" style="font-size:13px;color:#6b7280;margin-top:10px;">Salary: ₹0</p>
      </div>
      <div class="card">
        <h2>Analytics</h2>
        <canvas id="chart"></canvas>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
